<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" width="900" height="680" font-family="'Courier New', monospace">

  <!-- Background -->
  <rect width="900" height="680" fill="#0f0f13" rx="16"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f5a623" font-size="18" font-weight="bold" letter-spacing="2">LumiSetup — Wiring Diagram</text>
  <text x="450" y="56" text-anchor="middle" fill="#7a7a9a" font-size="11">ESP8266 NodeMCU + SR505/HC-SR501 + WS2812B</text>

  <!-- ─── POWER SUPPLY ─── -->
  <rect x="30" y="230" width="130" height="120" rx="10" fill="#1a1a24" stroke="#f5a623" stroke-width="1.5"/>
  <text x="95" y="252" text-anchor="middle" fill="#f5a623" font-size="11" font-weight="bold">POWER SUPPLY</text>
  <text x="95" y="268" text-anchor="middle" fill="#7a7a9a" font-size="10">5V / 2A min</text>
  <!-- pins -->
  <circle cx="130" cy="288" r="4" fill="#ff4444"/>
  <text x="118" y="292" text-anchor="end" fill="#ff4444" font-size="10">5V</text>
  <circle cx="130" cy="318" r="4" fill="#888"/>
  <text x="118" y="322" text-anchor="end" fill="#888" font-size="10">GND</text>

  <!-- ─── NodeMCU ─── -->
  <rect x="330" y="80" width="160" height="380" rx="10" fill="#1a1a24" stroke="#4caf7d" stroke-width="2"/>
  <text x="410" y="106" text-anchor="middle" fill="#4caf7d" font-size="12" font-weight="bold">NodeMCU</text>
  <text x="410" y="121" text-anchor="middle" fill="#7a7a9a" font-size="10">ESP8266MOD</text>
  <!-- Antenna symbol -->
  <path d="M400 130 Q410 120 420 130" stroke="#4caf7d" stroke-width="1.5" fill="none"/>
  <path d="M395 135 Q410 118 425 135" stroke="#4caf7d" stroke-width="1.5" fill="none"/>
  <line x1="410" y1="130" x2="410" y2="145" stroke="#4caf7d" stroke-width="1.5"/>

  <!-- Left pins NodeMCU -->
  <circle cx="330" cy="175" r="4" fill="#ff4444"/>
  <text x="342" y="179" fill="#ff4444" font-size="10">VIN</text>

  <circle cx="330" cy="205" r="4" fill="#888"/>
  <text x="342" y="209" fill="#888" font-size="10">GND</text>

  <circle cx="330" cy="235" r="4" fill="#aaddff"/>
  <text x="342" y="239" fill="#aaddff" font-size="10">3.3V</text>

  <!-- Right pins NodeMCU -->
  <circle cx="490" cy="300" r="4" fill="#f5a623"/>
  <text x="478" y="304" text-anchor="end" fill="#f5a623" font-size="10">D5</text>
  <text x="478" y="314" text-anchor="end" fill="#7a7a9a" font-size="9">GPIO14</text>

  <circle cx="490" cy="350" r="4" fill="#cc88ff"/>
  <text x="478" y="354" text-anchor="end" fill="#cc88ff" font-size="10">D6</text>
  <text x="478" y="364" text-anchor="end" fill="#7a7a9a" font-size="9">GPIO12</text>

  <!-- ─── PIR SENSOR ─── -->
  <rect x="620" y="100" width="130" height="130" rx="10" fill="#1a1a24" stroke="#f5a623" stroke-width="1.5"/>
  <text x="685" y="124" text-anchor="middle" fill="#f5a623" font-size="11" font-weight="bold">PIR SENSOR</text>
  <text x="685" y="139" text-anchor="middle" fill="#7a7a9a" font-size="10">SR505 / HC-SR501</text>
  <!-- dome symbol -->
  <path d="M665 160 Q685 145 705 160" stroke="#f5a623" stroke-width="1.5" fill="none"/>
  <path d="M670 167 Q685 155 700 167" stroke="#f5a623" stroke-width="1.2" fill="none"/>

  <!-- PIR pins -->
  <circle cx="620" cy="185" r="4" fill="#aaddff"/>
  <text x="632" y="189" fill="#aaddff" font-size="10">VCC</text>

  <circle cx="620" cy="205" r="4" fill="#888"/>
  <text x="632" y="209" fill="#888" font-size="10">GND</text>

  <circle cx="620" cy="225" r="4" fill="#f5a623"/>
  <text x="632" y="229" fill="#f5a623" font-size="10">OUT</text>

  <!-- ─── WS2812B ─── -->
  <rect x="620" y="310" width="130" height="140" rx="10" fill="#1a1a24" stroke="#cc88ff" stroke-width="1.5"/>
  <text x="685" y="334" text-anchor="middle" fill="#cc88ff" font-size="11" font-weight="bold">WS2812B</text>
  <text x="685" y="349" text-anchor="middle" fill="#7a7a9a" font-size="10">LED Strip</text>
  <!-- LED dots -->
  <circle cx="658" cy="370" r="6" fill="#ff6666" opacity="0.8"/>
  <circle cx="678" cy="370" r="6" fill="#66ff66" opacity="0.8"/>
  <circle cx="698" cy="370" r="6" fill="#6666ff" opacity="0.8"/>
  <circle cx="718" cy="370" r="6" fill="#ffff66" opacity="0.8"/>

  <!-- LED pins -->
  <circle cx="620" cy="395" r="4" fill="#ff4444"/>
  <text x="632" y="399" fill="#ff4444" font-size="10">5V</text>

  <circle cx="620" cy="415" r="4" fill="#888"/>
  <text x="632" y="419" fill="#888" font-size="10">GND</text>

  <circle cx="620" cy="435" r="4" fill="#cc88ff"/>
  <text x="632" y="439" fill="#cc88ff" font-size="10">DIN</text>

  <!-- ─── GND BUS ─── -->
  <line x1="95" y1="318" x2="95" y2="540" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="95" y1="540" x2="760" y2="540" stroke="#888" stroke-width="2"/>
  <!-- GND taps -->
  <line x1="330" y1="205" x2="280" y2="205" stroke="#888" stroke-width="1.5"/>
  <line x1="280" y1="205" x2="280" y2="540" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="685" y1="415" x2="620" y2="415" stroke="#888" stroke-width="1.5"/>
  <line x1="685" y1="205" x2="685" y2="540" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- GND label -->
  <rect x="390" y="530" width="60" height="18" rx="4" fill="#2a2a2a" stroke="#888" stroke-width="1"/>
  <text x="420" y="543" text-anchor="middle" fill="#888" font-size="10" font-weight="bold">GND BUS</text>

  <!-- ─── 5V BUS ─── -->
  <!-- PSU 5V → VIN -->
  <line x1="160" y1="288" x2="230" y2="288" stroke="#ff4444" stroke-width="2"/>
  <line x1="230" y1="175" x2="330" y2="175" stroke="#ff4444" stroke-width="2"/>
  <line x1="230" y1="175" x2="230" y2="395" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- PSU 5V → LED 5V -->
  <line x1="230" y1="395" x2="620" y2="395" stroke="#ff4444" stroke-width="2"/>
  <!-- junction dots -->
  <circle cx="230" cy="288" r="4" fill="#ff4444"/>
  <circle cx="230" cy="175" r="4" fill="#ff4444"/>
  <circle cx="230" cy="395" r="4" fill="#ff4444"/>

  <!-- ─── 3.3V → PIR VCC ─── -->
  <line x1="330" y1="235" x2="300" y2="235" stroke="#aaddff" stroke-width="1.5"/>
  <line x1="300" y1="185" x2="620" y2="185" stroke="#aaddff" stroke-width="1.5"/>
  <line x1="300" y1="185" x2="300" y2="235" stroke="#aaddff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="300" cy="235" r="3" fill="#aaddff"/>

  <!-- ─── D5 → PIR OUT ─── -->
  <line x1="490" y1="300" x2="560" y2="300" stroke="#f5a623" stroke-width="1.5"/>
  <line x1="560" y1="225" x2="620" y2="225" stroke="#f5a623" stroke-width="1.5"/>
  <line x1="560" y1="225" x2="560" y2="300" stroke="#f5a623" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="560" cy="300" r="3" fill="#f5a623"/>

  <!-- ─── D6 → LED DIN ─── -->
  <line x1="490" y1="350" x2="580" y2="350" stroke="#cc88ff" stroke-width="1.5"/>
  <line x1="580" y1="350" x2="580" y2="435" stroke="#cc88ff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="580" y1="435" x2="620" y2="435" stroke="#cc88ff" stroke-width="1.5"/>
  <circle cx="580" cy="350" r="3" fill="#cc88ff"/>

  <!-- ─── LEGEND ─── -->
  <rect x="30" y="565" width="240" height="88" rx="8" fill="#1a1a24" stroke="#2a2a3a" stroke-width="1"/>
  <text x="150" y="584" text-anchor="middle" fill="#7a7a9a" font-size="10" font-weight="bold" letter-spacing="1">LEGEND</text>
  <line x1="45" y1="598" x2="75" y2="598" stroke="#ff4444" stroke-width="2"/> <text x="82" y="602" fill="#ff4444" font-size="10">5V power</text>
  <line x1="45" y1="614" x2="75" y2="614" stroke="#888" stroke-width="2"/>    <text x="82" y="618" fill="#888" font-size="10">GND (common)</text>
  <line x1="45" y1="630" x2="75" y2="630" stroke="#aaddff" stroke-width="2"/> <text x="82" y="634" fill="#aaddff" font-size="10">3.3V</text>
  <line x1="155" y1="598" x2="185" y2="598" stroke="#f5a623" stroke-width="2"/><text x="192" y="602" fill="#f5a623" font-size="10">D5 — PIR signal</text>
  <line x1="155" y1="614" x2="185" y2="614" stroke="#cc88ff" stroke-width="2"/><text x="192" y="618" fill="#cc88ff" font-size="10">D6 — LED data</text>

  <!-- ─── WARNING ─── -->
  <rect x="290" y="565" width="310" height="62" rx="8" fill="#1a1a24" stroke="#e05c5c" stroke-width="1"/>
  <text x="445" y="584" text-anchor="middle" fill="#e05c5c" font-size="10" font-weight="bold">⚠ IMPORTANT</text>
  <text x="445" y="600" text-anchor="middle" fill="#7a7a9a" font-size="10">GND must be shared between power supply,</text>
  <text x="445" y="616" text-anchor="middle" fill="#7a7a9a" font-size="10">NodeMCU and LED strip.</text>

  <!-- footer -->
  <text x="450" y="660" text-anchor="middle" fill="#3a3a5a" font-size="10">Egalistel — egamaker.be</text>

</svg>
