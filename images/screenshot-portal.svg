<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 680" width="400" height="680" font-family="'Segoe UI', system-ui, sans-serif">

  <!-- Phone frame -->
  <rect width="400" height="680" fill="#1a1a2e" rx="40"/>
  <rect x="10" y="10" width="380" height="660" fill="#0f0f13" rx="32"/>

  <!-- Status bar -->
  <text x="30" y="42" fill="#7a7a9a" font-size="11">9:41</text>
  <rect x="300" y="30" width="22" height="11" rx="2" fill="none" stroke="#7a7a9a" stroke-width="1.2"/>
  <rect x="301" y="31" width="16" height="9" rx="1.5" fill="#4caf7d"/>
  <rect x="323" y="33" width="8" height="7" rx="1" fill="#7a7a9a"/>
  <circle cx="345" cy="36" r="5" fill="none" stroke="#7a7a9a" stroke-width="1.2"/>
  <circle cx="345" cy="36" r="2.5" fill="#7a7a9a"/>

  <!-- WiFi banner -->
  <rect x="20" y="55" width="360" height="28" rx="6" fill="#1a1a24" stroke="#f5a623" stroke-width="1"/>
  <text x="200" y="73" text-anchor="middle" fill="#f5a623" font-size="11">📶  Connected to LumiSetup</text>

  <!-- Card -->
  <rect x="30" y="100" width="340" height="490" rx="16" fill="#1a1a24" stroke="#2a2a3a" stroke-width="1.5"/>

  <!-- Lamp icon -->
  <text x="200" y="165" text-anchor="middle" font-size="48">💡</text>

  <!-- Title -->
  <text x="200" y="205" text-anchor="middle" fill="#f5a623" font-size="22" font-weight="bold" letter-spacing="1">LumiSetup</text>
  <text x="200" y="228" text-anchor="middle" fill="#7a7a9a" font-size="12">Configure your WiFi connection</text>
  <text x="200" y="244" text-anchor="middle" fill="#7a7a9a" font-size="12">for your smart lamp</text>

  <!-- SSID label + input -->
  <text x="55" y="278" fill="#7a7a9a" font-size="11">Network name (SSID)</text>
  <rect x="45" y="284" width="310" height="42" rx="8" fill="#0f0f13" stroke="#2a2a3a" stroke-width="1.2"/>
  <text x="62" y="310" fill="#e8e8f0" font-size="13">MyHomeWiFi</text>

  <!-- Password label + input -->
  <text x="55" y="344" fill="#7a7a9a" font-size="11">Password</text>
  <rect x="45" y="350" width="310" height="42" rx="8" fill="#0f0f13" stroke="#f5a623" stroke-width="1.5"/>
  <text x="62" y="376" fill="#e8e8f0" font-size="13">••••••••••••</text>
  <!-- cursor blink -->
  <rect x="178" y="362" width="2" height="18" rx="1" fill="#f5a623"/>

  <!-- Connect button -->
  <rect x="45" y="412" width="310" height="46" rx="10" fill="#f5a623"/>
  <text x="200" y="441" text-anchor="middle" fill="#111" font-size="14" font-weight="bold">Se connecter</text>

  <!-- Divider -->
  <line x1="55" y1="476" x2="345" y2="476" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Info -->
  <text x="200" y="500" text-anchor="middle" fill="#4a4a6a" font-size="10">After saving, reconnect to your WiFi</text>
  <text x="200" y="516" text-anchor="middle" fill="#4a4a6a" font-size="10">and open http://lumisetup.local</text>

  <!-- Footer -->
  <text x="200" y="548" text-anchor="middle" fill="#4a4a6a" font-size="10">Egalistel ·</text>
  <text x="230" y="548" fill="#f5a623" font-size="10" text-decoration="underline">egamaker.be</text>

  <!-- Home indicator -->
  <rect x="155" y="648" width="90" height="4" rx="2" fill="#3a3a5a"/>

</svg>
